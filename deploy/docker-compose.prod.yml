###############################################################################
# NetBird Production Deployment
#
# Usage:
#   cp .env.prod.example .env
#   # Set LDAP_ADMIN_PASSWORD (must match LDAP bindPW in ./config.yaml)
#   # Build with version tag (recommended)
#   export NETBIRD_VERSION=$(git describe --tags --always)
#   docker compose -f docker-compose.prod.yml build
#   docker compose -f docker-compose.prod.yml up -d
#
#   # Or specify version explicitly
#   NETBIRD_VERSION=v0.67.1 docker compose -f docker-compose.prod.yml up -d --build
#
# Differences from dev:
#   - Version-tagged images (not :dev)
#   - Health checks on all services
#   - Resource limits (memory / CPU)
#   - Security: read-only rootfs, no-new-privileges, non-root where possible
#   - No phpldapadmin (use CLI tools for LDAP management in prod)
#   - Structured JSON logging
###############################################################################

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    tag: "{{.Name}}"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: netbird-nginx
    restart: always
    networks: [netbird]
    ports:
      - "${NETBIRD_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      dashboard:
        condition: service_started
      netbird-server:
        condition: service_healthy
    # busybox nc (no wget/curl in nginx alpine)
    healthcheck:
      test: ["CMD-SHELL", "nc -z -w 2 127.0.0.1 80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    logging: *default-logging

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile.multistage
      args:
        # Dashboard releases use their own tags (e.g. v2.27.0), not the NetBird server version.
        NEXT_PUBLIC_DASHBOARD_VERSION: ${DASHBOARD_UI_VERSION:-latest}
    image: netbird-dashboard:${NETBIRD_VERSION:-latest}
    container_name: netbird-dashboard
    restart: always
    networks: [netbird]
    env_file:
      - ./dashboard.env
    depends_on:
      netbird-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  netbird-server:
    build:
      context: ../
      dockerfile: combined/Dockerfile.multistage
    image: netbird-server:${NETBIRD_VERSION:-latest}
    container_name: netbird-server
    restart: always
    networks: [netbird]
    ports:
      - "3478:3478/udp"
    volumes:
      - netbird_data:/var/lib/netbird
      - ./config.yaml:/etc/netbird/config.yaml:ro
      - ./GeoLite2-City.mmdb:/var/lib/netbird/GeoLite2-City_local.mmdb:ro
      - ./geonames_local.db:/var/lib/netbird/geonames_local.db:ro
    command: ["--config", "/etc/netbird/config.yaml"]
    depends_on:
      openldap:
        condition: service_healthy
    # Liveness: port 9000 accepts connections. /health may return 503 (e.g. relay WS
    # self-check) while the process is still up; requiring 200 makes Compose wait forever.
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  openldap:
    image: osixia/openldap:1.5.0
    container_name: netbird-openldap
    restart: always
    networks: [netbird]
    environment:
      LDAP_ORGANISATION: "${LDAP_ORGANISATION:-Example Org}"
      LDAP_DOMAIN: "${LDAP_DOMAIN:-example.org}"
      LDAP_ADMIN_PASSWORD: "${LDAP_ADMIN_PASSWORD:?Set LDAP_ADMIN_PASSWORD in .env}"
      LDAP_BASE_DN: "${LDAP_BASE_DN:-dc=example,dc=org}"
      LDAP_TLS: "true"
      LDAP_TLS_VERIFY_CLIENT: "never"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./ldap-init.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-init.ldif:ro
    command: --copy-service
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "${LDAP_BASE_DN:-dc=example,dc=org}", "-D", "cn=admin,${LDAP_BASE_DN:-dc=example,dc=org}", "-w", "${LDAP_ADMIN_PASSWORD:-adminpassword}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

volumes:
  netbird_data:
  ldap_data:
  ldap_config:

networks:
  netbird:
    driver: bridge
