services:
  nginx:
    image: nginx:alpine
    container_name: netbird-nginx
    restart: unless-stopped
    networks: [netbird]
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dashboard
      - netbird-server
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "2"

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile.multistage
    image: netbird-dashboard:dev
    container_name: netbird-dashboard
    restart: unless-stopped
    networks: [netbird]
    env_file:
      - ./dashboard.env
    depends_on:
      - netbird-server
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  netbird-server:
    build:
      context: ../
      dockerfile: combined/Dockerfile.multistage
      # When main lags GitHub Latest release, pin the reported version (must match combined/Dockerfile.multistage ARG NB_VERSION):
      # args:
      #   NB_VERSION: v0.68.3
    image: netbird-server:dev
    container_name: netbird-server
    restart: unless-stopped
    networks: [netbird]
    ports:
      - "3478:3478/udp"
    volumes:
      - netbird_data:/var/lib/netbird
      - ./config.yaml:/etc/netbird/config.yaml
      - ./GeoLite2-City.mmdb:/var/lib/netbird/GeoLite2-City_local.mmdb:ro
      - ./geonames_local.db:/var/lib/netbird/geonames_local.db:ro
      # After: ./deploy/sync-client-downloads.sh ./deploy/client-downloads
      # - ./client-downloads:/var/lib/netbird/downloads:ro
    environment:
      # With the mount above: NB_CLIENT_DOWNLOADS_DIR: /var/lib/netbird/downloads
      NB_EXPERIMENT_NETWORK_MAP: "false"
      NB_PEER_UPDATE_INTERVAL_MS: "1"
      NB_PEER_UPDATE_STARTUP_PERIOD_S: "1"
    command: ["--config", "/etc/netbird/config.yaml"]
    depends_on:
      openldap:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "2"

  openldap:
    image: osixia/openldap:1.5.0
    container_name: netbird-openldap
    restart: unless-stopped
    networks: [netbird]
    ports:
      - "389:389"
    environment:
      LDAP_ORGANISATION: "Example Org"
      LDAP_DOMAIN: "example.org"
      LDAP_ADMIN_PASSWORD: "adminpassword"
      LDAP_BASE_DN: "dc=example,dc=org"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./ldap-init.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-init.ldif
    command: --copy-service
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "dc=example,dc=org", "-D", "cn=admin,dc=example,dc=org", "-w", "adminpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "2"

volumes:
  netbird_data:
  ldap_data:
  ldap_config:

networks:
  netbird:
    driver: bridge
